services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    ports:
      - "3000:3000"
      - "4200:4200"
    environment:
      - DATABASE_URL=mysql://campaign:campaign@db:3306/campaign_flow
      - PORT=3000
      - FRONTEND_URL=http://localhost:4200
    depends_on:
      db:
        condition: service_healthy
    networks:
      - campaign_net

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: campaign_flow
      MYSQL_USER: campaign
      MYSQL_PASSWORD: campaign
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "campaign", "-pcampaign"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - campaign_net

volumes:
  mysql_data:

networks:
  campaign_net:
